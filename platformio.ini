; PlatformIO Project Configuration File
;
; Build / upload / monitor settings for the Mega 2560 + SSD1351 build.
; Library dependencies (Adafruit GFX, SSD1351 driver, Bounce2) are pulled
; from the PlatformIO registry via lib_deps below - the vendored copies
; that used to live in src/ and include/ have been removed.

[env:megaatmega2560]
platform        = atmelavr
board           = megaatmega2560
framework       = arduino

; Modern C++: GCC for AVR (7.3 in the PIO toolchain) supports C++17.
; -Wall -Wextra catch the common foot-guns; -Wno-* silence the noise
; we get from the Adafruit / Arduino headers we don't own.
build_unflags   = -std=gnu++11
build_flags     =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter

upload_port     = /dev/cu.usbmodem1201
monitor_port    = /dev/cu.usbmodem1201
monitor_speed   = 115200

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1351 library
    thomasfredericks/Bounce2
